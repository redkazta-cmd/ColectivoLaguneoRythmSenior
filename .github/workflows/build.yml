name: Build VST3 Plugin

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git C:/dev/JUCE

      - name: Configure CMake
        run: cmake -B build -S . -DJUCE_DIR=C:/dev/JUCE -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColectivoLaguneoRhythmSenior-VST3
          path: build/ColectivoLaguneoRhythmSenior_artefacts/Release/VST3/
          if-no-files-found: error
